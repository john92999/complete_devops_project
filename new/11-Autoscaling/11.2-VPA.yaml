# ─────────────────────────────────────────────
# NOTE: VPA is not built into Kubernetes by default
# Install it first:
# kubectl apply -f https://github.com/kubernetes/autoscaler/releases/latest/download/vertical-pod-autoscaler.yaml
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Deployment that VPA will manage
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m" # ← VPA will adjust these automatically
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

---
# ─────────────────────────────────────────────
# VPA - Vertical Pod Autoscaler
# Automatically adjusts CPU and Memory
# requests/limits of existing pods
# ─────────────────────────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: web-app-vpa
  namespace: default
spec:
  # ── Target deployment to manage ─────────────
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app # ← must match deployment name above

  # ── Update Policy ───────────────────────────
  updatePolicy:
    updateMode: "Auto" # ← see all modes below

  # ── Resource Policy ─────────────────────────
  # Controls how VPA manages each container
  resourcePolicy:
    containerPolicies:
      - containerName: web-app # ← must match container name in deployment
        controlledMode: "RequestsAndLimits" # ← see all modes below

        # Boundaries for VPA recommendations
        minAllowed:
          cpu: "50m" # ← VPA will never set cpu below 50m
          memory: "64Mi" # ← VPA will never set memory below 64Mi
        maxAllowed:
          cpu: "2" # ← VPA will never set cpu above 2 cores
          memory: "2Gi" # ← VPA will never set memory above 2Gi

        # Which resources VPA should control
        controlledResources:
          - cpu
          - memory
