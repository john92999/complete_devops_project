apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-db-job
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 100
  ttlSecondsAfterFinished: 60 # This will automatically clean up the job after 60 seconds of completion
  template:
    spec:
      containers:
        - name: mongo-db
          image: mongo:latest
          command: ["/bin/sh", "-c", "echo 'Running MongoDB job'"]
          args:
            [
              "mongodump --uri mongodb://user:password@mongodb-service:27017/mydb",
            ]
          volumeMounts:
            - mountPath: "/usr/share/mongodump/"
              name: "mongodump"
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "admin"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "password"
      volumes:
        - name: mongodump
          persistentVolumeClaim:
            claimName: mongodump
      restartPolicy: Never
