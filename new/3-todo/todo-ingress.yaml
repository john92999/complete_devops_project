apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: todo.com
      http:
        paths:
          - path: /(.*)
            pathType: Prefix
            backend:
              service: todo-ui-service
              port:
                number: 3001
          - path: /api/(.*)
            pathType: Prefix
            backend:
              service: todo-api-service
              port:
                number: 8080
