apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-db
  template:
    metadata:
      name: mongo-pod
      labels:
        app: mongo-db
    spec:
      containers:
        - name: mongo
          image: mongo
          args: ["-dbpath", "/data/db"]
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "admin"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "password"
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-volume
              mountPath: /data/db #(This is directory in container where the data will be stored)
      volumes:
        - name: mongo-volume
          persistentVolumeClaim:
            claimName: mongo-pvc #(Here we are using PVC instead of emptyDir or hostPath, this will allow us to store data even if the pod is deleted and also we can use the same PVC in other pods if needed)


