apiVersion: v1
kind: Pod
metadata:
  name: liveness-exec-demo
  namespace: default
spec:
  containers:
    - name: myapp
      image: nginx

      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy # ← checks if this file exists, if not → container is unhealthy
        initialDelaySeconds: 10 # ← wait 10s after container starts before first probe
        periodSeconds: 5 # ← check every 5 seconds
        timeoutSeconds: 3 # ← if probe takes more than 3s → counts as failure
        successThreshold: 1 # ← 1 success = healthy (for liveness must always be 1)
        failureThreshold: 3 # ← 3 consecutive failures → restart container
